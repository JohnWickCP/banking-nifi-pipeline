name: banking-nifi-pipeline

# ─── Service connection cheat-sheet (from INSIDE Docker network) ────────────
#   Kafka bootstrap :  kafka:29092
#   PostgreSQL      :  postgres:5432   db=banking_dw  user=banking
#   MinIO S3 API    :  http://minio:9000
#   NiFi UI         :  https://banking-nifi:8443/nifi  (self-signed TLS)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── ZooKeeper (required by Kafka 3.6) ──────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: banking-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - banking-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo ruok > /dev/tcp/localhost/2181'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka 3.6 ───────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: banking-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT = host access (localhost:9092)
      # PLAINTEXT_INTERNAL = inter-container (kafka:29092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - banking-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Kafka topic initializer (runs once, creates 3 topics) ──────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: banking-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - banking-net
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "==> Creating Kafka topics..."
        kafka-topics --create --if-not-exists \
          --bootstrap-server kafka:29092 \
          --topic txn.raw \
          --partitions 3 \
          --replication-factor 1 \
          --config retention.ms=259200000
        kafka-topics --create --if-not-exists \
          --bootstrap-server kafka:29092 \
          --topic txn.alert \
          --partitions 1 \
          --replication-factor 1 \
          --config retention.ms=2592000000
        kafka-topics --create --if-not-exists \
          --bootstrap-server kafka:29092 \
          --topic txn.dead-letter \
          --partitions 1 \
          --replication-factor 1 \
          --config retention.ms=604800000
        echo "==> Topics created:"
        kafka-topics --list --bootstrap-server kafka:29092
    restart: "no"

  # ── PostgreSQL 15 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: banking-postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-banking_dw}
      POSTGRES_USER: ${POSTGRES_USER:-banking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-banking123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # sql/ files auto-run on first init (empty volume only).
      # To re-run: docker compose down -v && docker compose up -d postgres
      - ../sql:/docker-entrypoint-initdb.d:ro
    networks:
      - banking-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-banking} -d ${POSTGRES_DB:-banking_dw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Apache NiFi 1.23 ────────────────────────────────────────────────────────
  nifi:
    image: apache/nifi:1.23.2
    container_name: banking-nifi
    ports:
      - "${NIFI_HOST_PORT:-8443}:8443"
    environment:
      NIFI_JVM_HEAP_INIT: ${NIFI_JVM_HEAP_INIT:-1g}
      NIFI_JVM_HEAP_MAX: ${NIFI_JVM_HEAP_MAX:-2g}
      SINGLE_USER_CREDENTIALS_USERNAME: ${NIFI_USERNAME:-admin}
      # Password must be 12+ chars with upper, lower, digit, special
      SINGLE_USER_CREDENTIALS_PASSWORD: ${NIFI_PASSWORD:-Banking@Admin1}
    volumes:
      - nifi_state:/opt/nifi/nifi-current/state
      - nifi_data:/opt/nifi/nifi-current/data
      - nifi_logs:/opt/nifi/nifi-current/logs
      # Uncomment to bind-mount conf (persists flow.xml outside Docker volume):
      # - ./nifi/conf:/opt/nifi/nifi-current/conf
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - banking-net
    healthcheck:
      test: ["CMD-SHELL", "curl -ks https://localhost:8443/nifi-api/system-diagnostics | grep -q uptime || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s

  # ── MinIO (S3-compatible Data Lake) ────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: banking-minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - banking-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Grafana 10 ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.0.0
    container_name: banking-grafana
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - banking-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Networks ────────────────────────────────────────────────────────────────
networks:
  banking-net:
    driver: bridge

# ── Named volumes (data survives container restarts) ───────────────────────
volumes:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  postgres_data:
  nifi_state:
  nifi_data:
  nifi_logs:
  minio_data:
  grafana_data:
